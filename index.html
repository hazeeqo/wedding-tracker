<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Tracker</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Splash -->
<div id="splash">
    <div class="logo">💍</div>
    <h1>Wedding Tracker</h1>
    <p>Planning your big day made easier</p>
</div>

<!-- Dashboard -->
<div id="dashboard">
    <header>
        <h2>Wedding Dashboard</h2>
        <p>Welcome back</p>
    </header>

    <div class="summaryCard">
        <h3>Total Budget</h3>
        <h1>RM 0</h1>

        <div class="progressBar">
            <div id="budgetProgress"></div>
        </div>

        <div class="summaryNumbers">
            <div>
                <span>Spent</span>
                <strong id="spentAmount">RM 0</strong>
            </div>
            <div>
                <span>Remaining</span>
                <strong id="remainingAmount">RM 0</strong>
            </div>
        </div>
    </div>

    <div class="menuGrid">

        <div class="menuCard" onclick="showExpenses()">
            <div class="icon">💳</div>
            Expenses
        </div>

        <div class="menuCard">💰 Savings</div>
        <div class="menuCard">🧾 Receipts</div>
        <div class="menuCard">📊 Reports</div>

    </div>

    <div class="recent">
        <h3>Recent Expenses</h3>
        <div id="recentExpenseList">No expenses yet.</div>
    </div>

    <button class="primaryBtn" onclick="openExpenseModal()">
        + Add Expense
    </button>

</div>

<!-- Expenses Page -->
<div id="expensesPage">

    <div class="pageHeader">
        <button onclick="backHome()">←</button>
        <h2>Expenses</h2>
    </div>

    <div id="expenseList"></div>

</div>

<!-- Modal -->
<div id="expenseModal">

    <div class="modalContent">

        <div class="modalHeader">
            <h2>Add Expense</h2>
            <button onclick="closeExpenseModal()">✕</button>
        </div>

        <label>Item</label>
        <input id="item">

        <label>Vendor</label>
        <input id="vendor">

        <label>Total Cost</label>
        <input id="cost" type="number">

        <label>Deposit</label>
        <input id="deposit" type="number">

        <label>Description</label>
        <textarea id="desc"></textarea>

        <button class="primaryBtn" onclick="saveExpense()">
            Save Expense
        </button>

    </div>

</div>

<script src="js/navigation.js"></script>
<script src="js/app.js"></script>

</body>
</html>

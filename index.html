<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Tracker</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= APP WRAPPER ================= -->
<div class="app">

    <!-- ================= DASHBOARD ================= -->
    <section id="dashboard" class="screen active">

        <h2>Dashboard</h2>

        <div class="card">
            <h3>Total Budget</h3>
            <p>RM 0</p>
        </div>

        <div class="card">
            <h3>Spent</h3>
            <p>RM 0</p>
        </div>

        <div class="card">
            <h3>Remaining</h3>
            <p>RM 0</p>
        </div>

    </section>

    <!-- ================= EXPENSES ================= -->
    <section id="expenses" class="screen">

        <h2>Expenses</h2>

        <div id="expenseList"></div>

    </section>

    <!-- ================= RECEIPTS (placeholder) ================= -->
    <section id="receipts" class="screen">

        <h2>Receipts</h2>

        <p>No receipts yet</p>

    </section>

</div>

<!-- ================= ADD BUTTON ================= -->
<button class="fab" onclick="openAddExpense()">
    +
</button>

<!-- ================= MODAL ================= -->
<div id="expenseModal" class="modal hidden">

    <div class="modalBox">

        <h3>Add Expense</h3>

        <input id="item" placeholder="Item">
        <input id="vendor" placeholder="Vendor">
        <input id="cost" type="number" placeholder="Cost">

        <button onclick="saveExpense()">Save</button>
        <button onclick="closeAddExpense()">Close</button>

    </div>

</div>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottomNav">

    <button onclick="showTab('dashboard')">Home</button>
    <button onclick="showTab('expenses')">Expenses</button>
    <button onclick="showTab('receipts')">Receipts</button>

</nav>

<script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <h1>Wedding Tracker 💍</h1>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <h2>Dashboard</h2>

  <div class="card" onclick="showExpenses()">
    Expenses
  </div>

  <div class="card">
    Savings (coming soon)
  </div>
</div>

<!-- EXPENSE PAGE -->
<div id="expensesPage" class="hidden">
  
  <div class="header">
    <button onclick="backHome()">←</button>
    <h2>Expenses</h2>
  </div>

  <button class="addBtn" onclick="openForm()">+ Add Expense</button>

  <div id="expenseList"></div>
</div>

<!-- FORM -->
<div id="formPage" class="hidden">
  <h3>Add Expense</h3>

  <input id="item" placeholder="Item name">
  <input id="vendor" placeholder="Vendor">
  <input id="cost" placeholder="Total cost (RM)">
  <input id="deposit" placeholder="Deposit paid (RM)">
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="saveExpense()">Save</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
